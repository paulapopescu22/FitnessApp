<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quiz Elegant</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      font-family: 'Georgia', serif;
      background-color: #f5f0e6; /* bej pal */
      display: flex;
      justify-content: center;
      align-items: center;
    }

    /* Săgeata fixă în colțul stânga-sus */
    .back-arrow {
      position: fixed;       /* FIXAT în viewport */
      top: 20px;
      left: 20px;
      width: 60px;
      height: 60px;
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 32px;
      font-weight: bold;
      color: #6e5849;
      cursor: pointer;
      background-color: #fff8f0;
      border-radius: 15px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
      transition: 0.3s;
      z-index: 1000; /* să fie deasupra containerului */
    }

    .back-arrow:hover {
      background-color: #e6d9c6;
      color: #4a3b2f;
    }

    /* Container quiz */
    #root {
      width: 100%;
      height: 100%;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .quiz-container {
      text-align: center;
      background-color: #fff8f0;
      padding: 60px 50px;
      border-radius: 25px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.15);
      max-width: 600px;
      width: 90%;
      transition: transform 0.3s, box-shadow 0.3s;
    }

    .quiz-container:hover {
      transform: translateY(-5px);
      box-shadow: 0 15px 30px rgba(0,0,0,0.2);
    }

    h1 {
      margin-bottom: 50px;
      font-size: 28px;
      color: #6e5849;
    }

    button {
      padding: 18px 45px;
      margin: 15px;
      font-size: 18px;
      border: none;
      border-radius: 15px;
      cursor: pointer;
      transition: all 0.3s;
      background-color: #d8c4a2;
      color: #4a3b2f;
      box-shadow: 0 5px 15px rgba(0,0,0,0.1);
    }

    button:hover {
      transform: scale(1.05);
      background-color: #cbb79a;
    }

    ul {
      text-align: left;
      margin-top: 30px;
      font-size: 20px;
      color: #6e5849;
    }

    li {
      margin-bottom: 10px;
    }
  </style>
</head>
<body>
  <!-- Săgeata fixă -->
  <div class="back-arrow" onclick="window.location.href='index.html'">
    &larr;
  </div>

  <!-- Quiz container -->
  <div id="root"></div>

  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/babel-standalone@6/babel.min.js"></script>

  <script type="text/babel">
    function Quiz() {
      const questions = [
        {
          question: "Cum te numești?",
          options: ["Ana", "Ion", "Maria", "George"]
        },
        {
          question: "Care este orașul tău preferat?",
          options: ["București", "Cluj", "Timișoara", "Iași"]
        },
        {
          question: "Ce mâncare îți place cel mai mult?",
          options: ["Pizza", "Paste", "Salată", "Fructe"]
        }
      ];

      const [currentQuestionIndex, setCurrentQuestionIndex] = React.useState(0);
      const [answers, setAnswers] = React.useState([]);
      const [finished, setFinished] = React.useState(false);

      function handleClick(option) {
        setAnswers([...answers, option]);
        if (currentQuestionIndex + 1 < questions.length) {
          setCurrentQuestionIndex(currentQuestionIndex + 1);
        } else {
          setFinished(true);
        }
      }

      if (finished) {
        return (
          <div className="quiz-container">
            <h1>Răspunsurile tale:</h1>
            <ul>
              {answers.map((answer, idx) => (
                <li key={idx}>{questions[idx].question}: {answer}</li>
              ))}
            </ul>
          </div>
        );
      }

      const currentQuestion = questions[currentQuestionIndex];

      return (
        <div className="quiz-container">
          <h1>{currentQuestion.question}</h1>
          {currentQuestion.options.map((option, idx) => (
            <button key={idx} onClick={() => handleClick(option)}>
              {option}
            </button>
          ))}
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<Quiz />);
  </script>
</body>
</html>
